name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag points to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit on origin/main."
            exit 1
          fi

  build:
    needs: verify
    uses: ./.github/workflows/reusable-build.yml
    with:
      upload_artifact: true
      artifact_name: release-jars
      fetch_depth: 0
      fetch_tags: true

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build jars
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.jar
